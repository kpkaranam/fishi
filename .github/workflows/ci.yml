name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build core
        run: npm run build:core

      - name: Build CLI
        run: npm run build:cli

      - name: Test core (302 tests)
        run: npm test -w packages/core

      - name: Test CLI (58 tests)
        run: npm test -w packages/cli

      - name: Scaffold smoke test
        run: |
          mkdir -p /tmp/fishi-ci-test
          cd /tmp/fishi-ci-test
          git init
          node $GITHUB_WORKSPACE/packages/cli/dist/index.js init "CI smoke test" --no-interactive
          node .fishi/scripts/validate-scaffold.mjs
          node .fishi/scripts/phase-runner.mjs dry-run
